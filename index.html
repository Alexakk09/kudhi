<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Forgive Me? 🥺</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#ffe4ec;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
}

.hearts{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
}

.hearts span{
    position:absolute;
    color:#ff7aa5;
    opacity:.25;
    animation:float linear infinite;
}

@keyframes float{
    from{ transform:translateY(110vh); }
    to{ transform:translateY(-100px); }
}

.card{
    width:92%;
    max-width:520px;
    background:white;
    padding:45px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 15px 40px rgba(255,77,136,.15);
    z-index:10;
}

.photo{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:20px;
    margin-bottom:18px;
    box-shadow:0 8px 20px rgba(0,0,0,.12);
}

h1{
    color:#ff4d88;
    margin-bottom:10px;
    font-size:42px;
}

p{
    color:#777;
    margin-bottom:25px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
}

button{
    border:none;
    border-radius:14px;
    padding:14px 26px;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.25s;
}

#yesBtn,
#yesBtn2,
#yesBtn3{
    background:#ff4d88;
    color:white;
}

#noBtn,
#noBtn2,
#noBtn3{
    background:white;
    color:#444;
    border:2px solid #eee;
}

.success{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    height:100vh;
}

.success img{
    width:340px;
    height:340px;
    object-fit:cover;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.success h1{
    margin-top:20px;
    font-size:3rem;
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<!-- PAGE 1 -->
<div class="card" id="page1">

    <img class="photo" src="photo1.jpg">

    <h1>Will You Forgive Me? 🥺</h1>

    <p>Choose carefully ❤️</p>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😭</button>
    </div>

</div>

<!-- PAGE 2 -->
<div class="card" id="page2" style="display:none;">

    <img class="photo" src="photo2.jpg">

    <h1>Khushi.exe selected NO</h1>

    <p>
        <strong>Veer.dll</strong> has stopped working. 💔⚠️ Despite the damage,
    </p>

    <h1 style="font-size:32px;">Khushi.exe = Adorable ✅</h1>

    <div class="buttons">
        <button id="yesBtn2">Okay ❤️</button>
        <button id="noBtn2">Still No 😭</button>
    </div>

</div>

<!-- PAGE 3 (DEVELOPER NOTE) -->
<div class="card" id="page3" style="display:none;">

    <img class="photo" src="photo3.jpg">

    <h1>Developer Note 🧾</h1>

    <p style="font-size:18px;">
        Khushi.exe was optimized for kindness, not for clicking No. 🥺🌷
    </p>

    <h1 style="font-size:28px;">Khushi.exe still running ❤️</h1>

    <div class="buttons">
        <button id="yesBtn3">Okay ❤️</button>
        <button id="noBtn3">Still No 😭</button>
    </div>

</div>

<script>

// Hearts animation
const hearts = document.getElementById("hearts");

for(let i=0;i<30;i++){
    const heart = document.createElement("span");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random()*100 + "%";
    heart.style.fontSize = (12 + Math.random()*20) + "px";
    heart.style.animationDuration = (8 + Math.random()*10) + "s";
    heart.style.animationDelay = Math.random()*8 + "s";
    hearts.appendChild(heart);
}

// Pages
const page1 = document.getElementById("page1");
const page2 = document.getElementById("page2");
const page3 = document.getElementById("page3");

// PAGE 1 → PAGE 2
document.getElementById("noBtn").addEventListener("click", () => {
    page1.style.display = "none";
    page2.style.display = "block";
});

// PAGE 2 → PAGE 3 (NEW)
document.getElementById("noBtn2").addEventListener("click", () => {
    page2.style.display = "none";
    page3.style.display = "block";
});

// PAGE 3 → FINAL NO (optional end screen)
document.getElementById("noBtn3").addEventListener("click", () => {
    document.body.innerHTML = `
    <div class="success">
        <img src="photo3.jpg">
        <h1>Okay... 😔</h1>
        <p>System accepted your decision.</p>
    </div>
    `;
});

// SUCCESS FUNCTION
function showSuccess(){
    document.body.innerHTML = `
    <div class="success">
        <img src="success.jpg">
        <h1>YAYYY ❤️</h1>
        <p style="font-size:1.2rem;">
            Thank you!! You make me so happy 😭❤️
        </p>
        <p style="
        margin-top:8px;
        font-size:32px;
        font-weight:700;
        color:#ff4d88;
        ">
        Meri Pyaari Khushi 🌷❤️
        </p>
    </div>
    `;
}

// YES BUTTONS
document.getElementById("yesBtn").addEventListener("click", showSuccess);
document.getElementById("yesBtn2").addEventListener("click", showSuccess);
document.getElementById("yesBtn3").addEventListener("click", showSuccess);

</script>

</body>
</html>
